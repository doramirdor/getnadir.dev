              "@type": "Question",
              "name": "What is Nadir?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nadir is an open-source LLM router that sits between your application and LLM providers. It analyzes prompt complexity in real-time and automatically routes simple requests to cheaper models while keeping complex tasks on premium models, saving 30-60% on API costs without changing any code."
              }
            },
            {
              "@type": "Question",
              "name": "How does Nadir reduce costs?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nadir classifies each prompt by complexity. Simple tasks like status checks, formatting, and basic Q&A are routed to budget-tier models. Complex tasks like code generation and reasoning stay on premium models. You pay less per token on average — without sacrificing quality where it matters."
              }
            },
            {
              "@type": "Question",
              "name": "Does Nadir require code changes?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. Nadir is a drop-in proxy. Point your LLM client's base URL to Nadir instead of the provider directly. It works with Claude Code, Cursor, Aider, and any OpenAI-compatible client."
              }
            },
            {
              "@type": "Question",
              "name": "Is Nadir free?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Nadir is free and open-source under the MIT license. You can self-host it on your own infrastructure at no cost. A hosted Pro plan is also available with advanced algorithms."
              }
            },
            {
              "@type": "Question",
              "name": "What LLM providers does Nadir support?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nadir supports Anthropic (Claude), OpenAI (GPT), and Google (Gemini) models out of the box. You can configure custom model tiers and routing rules for any OpenAI-compatible provider."
              }
            },
            {
              "@type": "Question",
              "name": "How do I install Nadir?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Run pip install nadirclaw and then nadirclaw serve. Configuration is done through environment variables or a config file. Two commands, zero configuration."
              }
            },
            {
              "@type": "Question",
              "name": "How does the classifier work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nadir uses sentence embeddings (DistilBERT-based) to compute cosine similarity against pre-trained centroid vectors for simple and complex prompts. Classification takes ~10ms. It also detects agentic workflows (tool calls), reasoning chains, and vision content (images) as separate routing signals."
              }
            },
            {
              "@type": "Question",
              "name": "What happens when the classifier is wrong?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nadir biases toward the complex model on low-confidence classifications. This means it's more likely to over-serve (send a simple prompt to a premium model) than under-serve. You can test any prompt with nadir classify and tune the confidence threshold."
              }
            },
            {
              "@type": "Question",
              "name": "How much latency does routing add?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "~10ms for the sentence embedding classification. The router runs locally on your machine, so there is no network hop. For comparison, a typical LLM API call takes 500ms-5s. The routing overhead is less than 1% of total request time."
              }
            },

              }
            }

[pytest]
asyncio_mode = auto
# Auto mode means @pytest.mark.asyncio is implied on async test functions, so a
# future async test added without the explicit decorator still runs instead of
# silently being collected as a coroutine object. Closes cycle 1 retro item 14
# (validators noted this gap in cycles 1 and 2).
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning:litellm.*

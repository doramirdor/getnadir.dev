<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | NadirClaw</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to NadirClaw, the open-source LLM router.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #0a0a0a; --muted: #666666; --accent: #0066ff; --border: #e5e5e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 2rem; max-width: 560px; }
        .code { font-size: 120px; font-weight: 700; color: var(--border); line-height: 1; margin-bottom: 16px; letter-spacing: -4px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
        p { color: var(--muted); margin-bottom: 32px; font-size: 16px; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .links a { color: var(--accent); text-decoration: none; font-size: 15px; font-weight: 500; padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
        .links a:hover { border-color: var(--accent); background: #f0f7ff; }
        @media (max-width: 768px) {
            .code { font-size: 80px; }
            h1 { font-size: 20px; }
            .links { flex-direction: column; }
            .links a { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="links">
            <a href="/">Home</a>
            <a href="/docs.html">Docs</a>
            <a href="https://github.com/NadirRouter/NadirClaw">GitHub</a>
        </div>
    </div>
</body>
</html>
